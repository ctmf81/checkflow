# Dispara o resumo mensal dos parceiros.
# Roda todo dia às 21:00 UTC (18:00 em Maceió) — a própria rota da API
# decide se hoje é o último dia do mês; nos demais dias responde
# { skip: 'nao_e_ultimo_dia_do_mes' } sem enviar nada.
#
# Requer o secret CRON_SECRET configurado em:
#   GitHub → Settings → Secrets and variables → Actions
# (mesmo valor da env var CRON_SECRET no serviço API do Railway)

name: Cron — resumo mensal parceiros

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch: {} # permite disparo manual na aba Actions (para testes)

jobs:
  resumo-mensal:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar rota do cron
        run: |
          resposta=$(curl -sS -w '\n%{http_code}' -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://api-production-5bce.up.railway.app/cron/parceiros/resumo-mensal)
          corpo=$(echo "$resposta" | head -n -1)
          status=$(echo "$resposta" | tail -n 1)
          echo "HTTP $status"
          echo "$corpo"
          if [ "$status" != "200" ]; then
            echo "::error::Falha no cron de parceiros (HTTP $status)"
            exit 1
          fi
